<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=1.9">
    <title>Login - PDV Control</title>
</head>
<body class="login-page">
    <div class="login-container">
        <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo-center" alt="Logo Autenticação" onerror="this.style.display='none'">
        <form action="/login" method="POST">
            <h2>Acesso ao Sistema</h2>
            {% if error %}
            <p class="error-msg">{{ error }}</p>
            {% endif %}
            <input type="text" name="username" placeholder="Usuário" required>
            <input type="password" name="password" placeholder="Senha" required>
            <button type="submit" class="btn-block">Entrar</button>
        </form>
        <a href="/consultar_chave" style="display:block; width:100%; box-sizing:border-box; margin-top:12px; padding:14px; background:#f1f5f9; color:#1e293b; border-radius:8px; font-size:15px; font-weight:600; text-decoration:none; text-align:center; border:1px solid #e2e8f0; cursor:pointer;">🧾 Consultar Cupom</a>
    </div>
</body>
</html>
