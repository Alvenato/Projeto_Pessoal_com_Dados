<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static/css/style.css">
    <title>Cadastro de Cliente</title>
</head>
<body>
    <div class="wrapper">
        <nav class="sidebar">
            <div class="sidebar-logo-container">
                <img src="static/images/logo.png" class="sidebar-logo" alt="Logo Menu">
            </div>
            <h3 class="sidebar-title">PDV Control</h3>
            
            <a href="admin.html" class="nav-btn vendas">Histórico de Vendas</a>
            <a href="cliente.html" class="nav-btn cliente active">Cadastrar Cliente</a>
            <a href="produto.html" class="nav-btn produto">Cadastrar Produto</a>
            <a href="caixa.html" class="nav-btn caixa">Frente de Caixa</a>
            
            <a href="index.html" class="nav-btn logout">Sair</a>
        </nav>
        
        <main class="content">
            <h2>Cadastro Detalhado de Cliente</h2>
            
            <form id="form-cliente" class="grid-form">
                <input type="text" id="nome" name="nome" placeholder="Nome Completo" required>
                <input type="email" id="email" name="email" placeholder="E-mail Principal">
                <input type="text" id="telefone" name="telefone" placeholder="Telefone Fixo">
                <input type="text" id="whatsapp" name="whatsapp" placeholder="WhatsApp / Celular">
                
                <input type="text" id="cep" name="cep" placeholder="CEP" onblur="pesquisacep(this.value)" required>
                <input type="text" id="logradouro" name="logradouro" placeholder="Logradouro">
                <input type="text" id="numero" name="numero" placeholder="Número">
                <input type="text" id="complemento" name="complemento" placeholder="Complemento">
                <input type="text" id="bairro" name="bairro" placeholder="Bairro">
                <input type="text" id="cidade" name="cidade" placeholder="Cidade">
                <input type="text" id="uf" name="uf" placeholder="UF">
                
                <input type="date" id="data_nasc" name="data_nasc">
                <select id="genero" name="genero">
                    <option value="" disabled selected style="display:none;">Selecione o Gênero</option>
                    <option value="M">Masculino</option>
                    <option value="F">Feminino</option>
                </select>
                
                <button type="submit" class="btn-submit">Salvar Registro</button>
            </form>

            <div class="clientes-cadastrados-container" style="margin-top: 40px;">
                <h3 style="margin-bottom: 15px; color: var(--text-dark); font-weight: 600;">Clientes Cadastrados</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>E-mail</th>
                                <th>WhatsApp / Celular</th>
                                <th>Cidade/UF</th>
                            </tr>
                        </thead>
                        <tbody id="lista-clientes">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- BANCO DE DADOS DE SIMULAÇÃO ---
        const mockClientes = [
            { nome: "João Silva", email: "joao@email.com", whatsapp: "(61) 99999-1111", telefone: "", cidade: "Brasília", uf: "DF" },
            { nome: "Maria Oliveira", email: "maria@email.com", whatsapp: "(61) 98888-2222", telefone: "", cidade: "Valparaíso de Goiás", uf: "GO" },
            { nome: "Carlos Santos", email: "", whatsapp: "", telefone: "(61) 3333-4444", cidade: "Gama", uf: "DF" }
        ];

        // --- INICIALIZAÇÃO DA TELA ---
        document.addEventListener("DOMContentLoaded", function() {
            renderizarTabela();
        });

        // Função responsável por atualizar a tabela na tela
        function renderizarTabela() {
            const tbody = document.getElementById('lista-clientes');
            tbody.innerHTML = ""; // Limpa a tabela

            if (mockClientes.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="4" style="padding: 20px; text-align: center; color: var(--text-light); font-style: italic;">Nenhum cliente cadastrado até o momento.</td>
                    </tr>`;
                return;
            }

            mockClientes.forEach(cliente => {
                const tr = document.createElement('tr');
                
                // Define o contato preferencial (WhatsApp, se não tiver vai Telefone, se não '-' )
                const contato = cliente.whatsapp || cliente.telefone || '-';
                const localidade = (cliente.cidade || cliente.uf) ? `${cliente.cidade || '-'}/${cliente.uf || '-'}` : '-';

                tr.innerHTML = `
                    <td>${cliente.nome}</td>
                    <td>${cliente.email || '-'}</td>
                    <td>${contato}</td>
                    <td>${localidade}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // --- INTERCEPTAR FORMULÁRIO E SIMULAR CADASTRO ---
        document.getElementById('form-cliente').addEventListener('submit', function(event) {
            event.preventDefault(); // Impede o recarregamento da página

            // Captura os dados digitados
            const novoCliente = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                telefone: document.getElementById('telefone').value,
                whatsapp: document.getElementById('whatsapp').value,
                cidade: document.getElementById('cidade').value,
                uf: document.getElementById('uf').value
            };

            // Adiciona no nosso banco de dados fake e atualiza a interface
            mockClientes.push(novoCliente);
            renderizarTabela();

            // Limpa os campos do formulário para o próximo cadastro
            document.getElementById('form-cliente').reset();
            alert("Cliente cadastrado com sucesso! (Simulado localmente)");
        });

        // --- SISTEMA VIA CEP (Mantido original) ---
        function meu_callback(conteudo) {
            if (!("erro" in conteudo)) {
                document.getElementById('logradouro').value=(conteudo.logradouro);
                document.getElementById('bairro').value=(conteudo.bairro);
                document.getElementById('cidade').value=(conteudo.localidade);
                document.getElementById('uf').value=(conteudo.uf);
            } else {
                alert("CEP não encontrado.");
            }
        }
        
        function pesquisacep(valor) {
            var cep = valor.replace(/\D/g, '');
            if (cep != "") {
                var validacep = /^[0-9]{8}$/;
                if(validacep.test(cep)) {
                    var script = document.createElement('script');
                    script.src = 'https://viacep.com.br/ws/'+ cep + '/json/?callback=meu_callback';
                    document.body.appendChild(script);
                } else {
                    alert("Formato de CEP inválido.");
                }
            }
        }
    </script>
</body>
</html>
